<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
    }

    /* Full-viewport render target — all output drawn here */
    #main {
      display: block;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    /* ── Control panel ───────────────────────────────────────────────────────
       Sits directly on the black page. No background, no card, no shadow.
       Near-invisible at rest; readable on hover. Font matches terminal aesthetic.
    ─────────────────────────────────────────────────────────────────────── */
    #panel {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      color: #555;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
      z-index: 10;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lbl { color: #555; letter-spacing: 0.03em; }
    .val { color: #eee; min-width: 52px; text-align: right; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 72px;
      height: 1px;
      background: #333;
      border-radius: 0;
      cursor: pointer;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px; height: 8px;
      background: #eee;
      border-radius: 50%;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 8px; height: 8px;
      background: #eee;
      border: none;
      border-radius: 50%;
    }

    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border: none;
      padding: 0;
      cursor: pointer;
      background: none;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 1px solid #555; border-radius: 0; }

    select {
      background: transparent;
      border: none;
      color: #eee;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    select option { background: #111; color: #eee; }

    button#colorBtn, button#exportBtn, button#bgOffBtn {
      background: transparent;
      border: none;
      color: #555;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      transition: color 0.12s;
    }
    button#colorBtn.on { color: #eee; }
    button#colorBtn:hover { color: #aaa; }
    button#exportBtn:disabled { color: #2a2a2a; cursor: default; }
    button#exportBtn:not(:disabled):hover { color: #aaa; }
    button#exportBtn.recording { color: #c04040; letter-spacing: 0; }

    .shape-add {
      color: #555;
      font-size: 13px;
      cursor: pointer;
      padding: 0 3px;
      transition: color 0.12s;
      user-select: none;
    }
    .shape-add:hover { color: #eee; }

    /* File input: invisible overlay on a fake text label */
    .file-wrap {
      position: relative;
      cursor: pointer;
    }
    .file-lbl {
      color: #555;
      transition: color 0.12s;
      cursor: pointer;
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-wrap:hover .file-lbl { color: #eee; }
    input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      cursor: pointer;
      font-size: 0;
    }

    #warnRow { display: none; }
    #warn { color: #333; font-size: 10px; letter-spacing: 0.02em; }

    video { display: none; }
  </style>
</head>
<body>

  <!-- ── Output canvas ──────────────────────────────────────────────────── -->
  <canvas id="main"></canvas>

  <!-- ── Hidden video player ───────────────────────────────────────────── -->
  <video id="vid" loop muted playsinline></video>

  <!-- ── Control panel ─────────────────────────────────────────────────── -->
  <div id="panel">
    <div class="row" id="warnRow">
      <span id="warn">rgb mode — reduced fps</span>
    </div>
    <div class="row">
      <span class="lbl">cols</span>
      <input type="range" id="colSlider" min="40" max="200" value="120">
      <span class="val" id="colVal">120×—</span>
    </div>
    <div class="row">
      <span class="lbl">size</span>
      <select id="sizeSelect">
        <option value="8">08px</option>
        <option value="10" selected>10px</option>
        <option value="12">12px</option>
        <option value="14">14px</option>
      </select>
    </div>
    <div class="row">
      <span class="lbl">ramp</span>
      <select id="rampSelect">
        <option value="dense">dense</option>
        <option value="sparse">sparse</option>
        <option value="blocks">blocks</option>
        <option value="braille">braille</option>
      </select>
    </div>
    <div class="row">
      <span class="lbl">color</span>
      <button id="colorBtn">grey</button>
    </div>
    <div class="row">
      <span class="lbl">rand</span>
      <input type="range" id="randSlider" min="0" max="100" value="0">
      <span class="val" id="randVal">0%</span>
    </div>
    <div class="row">
      <span class="lbl">vary</span>
      <input type="range" id="varySlider" min="0" max="100" value="0">
      <span class="val" id="varyVal">0%</span>
    </div>
    <div class="row">
      <span class="lbl">bg</span>
      <input type="color" id="bgColorInput" value="#000000">
      <button id="bgOffBtn">off</button>
    </div>
    <div class="row">
      <span class="lbl">mask</span>
      <span class="shape-add" data-type="circle" title="add circle">○</span>
      <span class="shape-add" data-type="rect" title="add rectangle">□</span>
      <span class="shape-add" id="clearShapes" title="remove all">clr</span>
    </div>
    <div class="row">
      <div class="file-wrap">
        <span class="file-lbl" id="fileLbl">open video</span>
        <input type="file" id="fileInput" accept="video/mp4,video/webm,video/quicktime,video/ogg,video/*">
      </div>
    </div>
    <div class="row">
      <button id="exportBtn" disabled>export</button>
    </div>
  </div>

  <script type="module">
    import { prepareWithSegments, layoutWithLines }
      from './lib/pretext.js';
    import { Muxer, ArrayBufferTarget }
      from './webm-muxer.js';

    // ════════════════════════════════════════════════════════════════════════
    //  CONSTANTS
    // ════════════════════════════════════════════════════════════════════════

    // Character ramps ordered dark → light (high visual density → low).
    // The index into the ramp is computed from luminance [0–1].
    const RAMPS = {
      dense:   '@#S%?*+;:,. ',
      sparse:  '@       .   ',
      blocks:  '█▓▒░ ',
      braille: '⣿⣷⣯⣟⡿⢿⣻⣽⣾⣶⣦⣤⣀⠀',
    };

    // Rendering font. Monospace is canonical for ASCII art;
    // pretext correctly handles proportional alternatives too.
    const RENDER_FONT_FAMILY = "'Courier New', Courier, monospace";

    // ════════════════════════════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════════════════════════════

    let cols       = 120;   // horizontal character grid resolution
    let fontSize   = 10;    // px — controls both grid density and character size
    let rampKey    = 'dense';
    let colorMode  = 'grey'; // 'grey' | 'rgb'
    let charRand   = 0;     // 0–1: probability a character is replaced with a random ramp char
    let sizeVar    = 0;     // 0–1: max fractional size deviation per character (0.5 = ±50%)
    let videoReady = false;  // true once a file is loaded and can produce frames
    let idleT      = 0;     // idle animation time accumulator
    let isExporting = false; // suppresses the live render loop during export

    // Draggable shapes that reflow the text around them
    let shapes     = [];
    let nextShapeId = 0;
    let dragShape  = null, dragOx = 0, dragOy = 0;
    let bgColor    = null;  // null = transparent; hex string = fill behind text grid only

    // ════════════════════════════════════════════════════════════════════════
    //  DOM ELEMENTS
    // ════════════════════════════════════════════════════════════════════════

    const mainCanvas = /** @type {HTMLCanvasElement} */ (document.getElementById('main'));
    const ctx        = mainCanvas.getContext('2d');
    const vid        = /** @type {HTMLVideoElement}  */ (document.getElementById('vid'));

    // ── Offscreen sample canvas ──────────────────────────────────────────────
    // The video frame is drawn here at cols×rows resolution so we can call
    // getImageData() without touching the main (visible) canvas.
    // willReadFrequently tells the browser to keep the backing store CPU-readable.
    const sampleCanvas = document.createElement('canvas');
    const sCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

    // ── Character-width cache ────────────────────────────────────────────────
    // In RGB mode we position each glyph individually, which requires per-char
    // widths. We pre-measure all ramp chars once per font string to avoid calling
    // measureText() inside the inner render loop.
    const widthCache = new Map(); // fontString → Map<char, width>

    function getCharWidths(font) {
      if (widthCache.has(font)) return widthCache.get(font);
      ctx.font = font;
      const map = new Map();
      const allChars = new Set(Object.values(RAMPS).join(''));
      for (const ch of allChars) {
        map.set(ch, ctx.measureText(ch).width);
      }
      widthCache.set(font, map);
      return map;
    }

    // ── Single character width (for aspect-ratio row calculation) ────────────
    // Cached per font string; used to derive rows from video aspect ratio.
    const monoWidthCache = new Map();
    function getCharWidth(font) {
      if (monoWidthCache.has(font)) return monoWidthCache.get(font);
      ctx.font = font;
      const w = ctx.measureText('m').width;
      monoWidthCache.set(font, w);
      return w;
    }

    // ════════════════════════════════════════════════════════════════════════
    //  RESIZE
    // ════════════════════════════════════════════════════════════════════════

    function resize() {
      mainCanvas.width  = window.innerWidth;
      mainCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ════════════════════════════════════════════════════════════════════════
    //  SAMPLING — video frame → pixel data
    // ════════════════════════════════════════════════════════════════════════

    // Draws the current video frame into the small sample canvas and reads pixels.
    // Returns raw RGBA Uint8ClampedArray and the computed row count.
    function sampleFrame(rows) {
      if (sampleCanvas.width !== cols || sampleCanvas.height !== rows) {
        sampleCanvas.width  = cols;
        sampleCanvas.height = rows;
      }
      sCtx.drawImage(vid, 0, 0, cols, rows);
      return sCtx.getImageData(0, 0, cols, rows).data;
    }

    // ════════════════════════════════════════════════════════════════════════
    //  GRID BUILDERS — pixel data / idle → string[]
    // ════════════════════════════════════════════════════════════════════════

    // Maps a luminance value [0–255] to a character from the active ramp.
    // charRand > 0: with that probability, swap the mapped char for a random ramp char.
    function lumToChar(lum) {
      const r = RAMPS[rampKey];
      if (charRand > 0 && Math.random() < charRand) return r[Math.floor(Math.random() * r.length)];
      return r[Math.round((lum / 255) * (r.length - 1))];
    }

    // Build character grid from downsampled video pixel data.
    // Each element is one row of cols characters (no trailing newline).
    function buildVideoGrid(pixelData, rows) {
      const lines = [];
      for (let row = 0; row < rows; row++) {
        let line = '';
        for (let col = 0; col < cols; col++) {
          const base = (row * cols + col) * 4;
          // BT.601 perceived luminance
          const lum = 0.299 * pixelData[base]
                    + 0.587 * pixelData[base + 1]
                    + 0.114 * pixelData[base + 2];
          line += lumToChar(lum);
        }
        lines.push(line);
      }
      return lines;
    }

    // Idle animation: diagonal wave of ramp characters scrolling across the grid.
    // Shown when no video is loaded.
    function buildIdleGrid(rows) {
      const ramp = RAMPS[rampKey];
      const lines = [];
      for (let row = 0; row < rows; row++) {
        let line = '';
        for (let col = 0; col < cols; col++) {
          // Layered sine waves — creates a flowing, organic texture
          const v = Math.sin(col * 0.18 + row * 0.12 + idleT)
                  + Math.sin(col * 0.07 - row * 0.22 + idleT * 1.3) * 0.5;
          const norm = (v / 1.5 + 1) / 2; // normalize to [0, 1]
          line += ramp[Math.floor(norm * (ramp.length - 1))];
        }
        lines.push(line);
      }
      idleT += 0.04;
      return lines;
    }

    // ════════════════════════════════════════════════════════════════════════
    //  SHAPES — obstruction geometry + reflow helpers
    // ════════════════════════════════════════════════════════════════════════

    // Horizontal screen-x range blocked by shape at the given row mid-y.
    // sx/sy scale shape coords for the export canvas (1 = live canvas).
    function shapeBlock(shape, midY, sx = 1, sy = 1) {
      if (shape.type === 'circle') {
        const dy = midY - shape.y * sy;
        const r  = shape.r * Math.min(sx, sy);
        if (Math.abs(dy) > r) return null;
        const dx = Math.sqrt(r * r - dy * dy);
        return { l: shape.x * sx - dx, r: shape.x * sx + dx };
      }
      const top = shape.y * sy, bot = (shape.y + shape.h) * sy;
      if (midY < top || midY > bot) return null;
      return { l: shape.x * sx, r: (shape.x + shape.w) * sx };
    }

    // Free x-segments within [x0, x1] after removing all shape obstructions.
    function rowSegments(midY, x0, x1, sx = 1, sy = 1) {
      const blocks = [];
      for (const s of shapes) {
        const b = shapeBlock(s, midY, sx, sy);
        if (!b) continue;
        const l = Math.max(x0, b.l), r = Math.min(x1, b.r);
        if (r > l) blocks.push({ l, r });
      }
      if (!blocks.length) return [{ l: x0, r: x1 }];

      blocks.sort((a, b) => a.l - b.l);
      const merged = [{ ...blocks[0] }];
      for (let i = 1; i < blocks.length; i++) {
        const last = merged[merged.length - 1];
        if (blocks[i].l <= last.r) last.r = Math.max(last.r, blocks[i].r);
        else merged.push({ ...blocks[i] });
      }

      const free = [];
      let x = x0;
      for (const b of merged) {
        if (b.l > x + 0.5) free.push({ l: x, r: b.l });
        x = b.r;
      }
      if (x < x1 - 0.5) free.push({ l: x, r: x1 });
      return free;
    }

    // Returns the topmost shape under screen point (px, py), or null.
    function shapeAtPoint(px, py) {
      for (let i = shapes.length - 1; i >= 0; i--) {
        const s = shapes[i];
        if (s.type === 'circle') {
          const dx = px - s.x, dy = py - s.y;
          if (dx * dx + dy * dy <= s.r * s.r) return s;
        } else {
          if (px >= s.x && px <= s.x + s.w && py >= s.y && py <= s.y + s.h) return s;
        }
      }
      return null;
    }

    // Draw shape fills + outlines. Fill covers any chars that leaked inside
    // due to floating-point boundary fuzz; outline marks the shape edge.
    function drawShapeOutlines(rctx, sx = 1, sy = 1) {
      rctx.save();
      for (const s of shapes) {
        rctx.beginPath();
        if (s.type === 'circle') {
          rctx.arc(s.x * sx, s.y * sy, s.r * Math.min(sx, sy), 0, Math.PI * 2);
        } else {
          rctx.rect(s.x * sx, s.y * sy, s.w * sx, s.h * sy);
        }
        rctx.fillStyle   = '#0a0a0a';              // erase any chars that crept inside
        rctx.fill();
        rctx.strokeStyle = 'rgba(255,255,255,0.3)';
        rctx.lineWidth   = 1;
        rctx.stroke();
      }
      rctx.restore();
    }

    // ════════════════════════════════════════════════════════════════════════
    //  RENDER LOOP
    // ════════════════════════════════════════════════════════════════════════

    function render() {
      if (isExporting) { requestAnimationFrame(render); return; }

      const W          = mainCanvas.width;
      const H          = mainCanvas.height;
      const lineHeight = fontSize * 1.2;
      const font       = `${fontSize}px ${RENDER_FONT_FAMILY}`;

      // ── Row count: derived from video aspect ratio + character cell shape ────
      // Characters are not square: in Courier New at 10px, a glyph is ~6px wide
      // but lineHeight is 12px — a 0.5 aspect ratio. To render a 16:9 video
      // without vertical stretching we need far fewer rows than canvas height
      // would suggest. Formula: (cols × charW) / (rows × lineH) = videoW / videoH
      // → rows = cols × (charW / lineH) × (videoH / videoW)
      const charWidth  = getCharWidth(font);
      const charAspect = charWidth / lineHeight; // ≈ 0.5 for Courier New

      let rows;
      if (videoReady && vid.videoWidth > 0 && vid.videoHeight > 0) {
        const videoAspect = vid.videoWidth / vid.videoHeight;
        rows = Math.max(1, Math.round(cols * charAspect / videoAspect));
      } else {
        // Idle: fill the canvas height
        rows = Math.max(1, Math.floor(H / lineHeight));
      }

      // Keep the cols×rows readout current every frame
      colVal.textContent = `${cols}×${rows}`;

      // ── SAMPLING ──────────────────────────────────────────────────────────
      // Draw video → offscreen canvas → read RGBA pixels → build char grid
      let charGrid, pixelData;

      if (videoReady && vid.readyState >= 2 && !vid.paused) {
        pixelData = sampleFrame(rows);
        charGrid  = buildVideoGrid(pixelData, rows);
      } else {
        pixelData = null;
        charGrid  = buildIdleGrid(rows);
      }

      // ── DRAW ──────────────────────────────────────────────────────────────
      ctx.clearRect(0, 0, W, H);
      ctx.font         = font;
      ctx.textBaseline = 'top';

      const startY = Math.round((H - rows * lineHeight) / 2);
      const pivX   = W / 2;

      // ── Background fill (grid area only) ──────────────────────────────────
      if (bgColor !== null) {
        ctx.fillStyle = bgColor;
        ctx.fillRect(Math.round((W - cols * charWidth) / 2), startY, cols * charWidth, rows * lineHeight);
      }

      if (shapes.length > 0) {
        // ── Reflow path ────────────────────────────────────────────────────
        // For each row, measure the total horizontal space the shapes block,
        // then expand the row's span by that amount before computing free
        // segments. This guarantees all cols chars have room to flow on both
        // sides of any shape — not just the right side.
        const cw    = charWidth;
        const gx0   = Math.round((W - cols * cw) / 2); // normal grid left edge
        const gx1   = gx0 + cols * cw;                 // normal grid right edge
        if (colorMode !== 'rgb' || pixelData === null) ctx.fillStyle = '#eee';

        for (let i = 0; i < rows; i++) {
          const y    = startY + i * lineHeight;
          const midY = y + lineHeight / 2;

          // Only count blockage that overlaps the actual text grid — shapes
          // outside the grid should have no effect on layout.
          let blockW = 0;
          for (const s of shapes) {
            const b = shapeBlock(s, midY);
            if (!b) continue;
            const il = Math.max(gx0, b.l), ir = Math.min(gx1, b.r);
            if (ir > il) blockW += (ir - il);
          }

          // Expand span by exactly the blocked portion of the grid
          const spanW = cols * cw + blockW;
          const x0    = Math.round((W - spanW) / 2);
          const segs  = rowSegments(midY, x0, x0 + spanW);

          if (sizeVar > 0) {
            const s = 1 + (Math.random() * 2 - 1) * sizeVar;
            ctx.setTransform(s, 0, 0, s, pivX * (1 - s), (y + lineHeight / 2) * (1 - s));
          }

          let col = 0;
          for (const seg of segs) {
            let x = seg.l;
            while (col < cols && x + cw <= seg.r + 0.5) {
              const ch = charGrid[i]?.[col] ?? ' ';
              if (colorMode === 'rgb' && pixelData !== null) {
                const b = (i * cols + col) * 4;
                ctx.fillStyle = `rgb(${pixelData[b]},${pixelData[b+1]},${pixelData[b+2]})`;
              }
              ctx.fillText(ch, x, y);
              x += cw; col++;
            }
          }

          if (sizeVar > 0) ctx.setTransform(1, 0, 0, 1, 0, 0);
        }

        drawShapeOutlines(ctx);

      } else {
        // ── Normal pretext path ────────────────────────────────────────────
        const text     = charGrid.join('\n');
        const prepared = prepareWithSegments(text, font, { whiteSpace: 'pre-wrap' });
        const { lines } = layoutWithLines(prepared, W, lineHeight);

        if (colorMode === 'grey' || pixelData === null) {
          ctx.fillStyle = '#eee';
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const y    = startY + i * lineHeight;
            if (sizeVar > 0) {
              const s = 1 + (Math.random() * 2 - 1) * sizeVar;
              ctx.setTransform(s, 0, 0, s, pivX * (1 - s), (y + lineHeight / 2) * (1 - s));
            }
            ctx.fillText(line.text, Math.round((W - line.width) / 2), y);
          }
          if (sizeVar > 0) ctx.setTransform(1, 0, 0, 1, 0, 0);
        } else {
          const widths = getCharWidths(font);
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const y    = startY + i * lineHeight;
            if (sizeVar > 0) {
              const s = 1 + (Math.random() * 2 - 1) * sizeVar;
              ctx.setTransform(s, 0, 0, s, pivX * (1 - s), (y + lineHeight / 2) * (1 - s));
            }
            let charX = Math.round((W - line.width) / 2);
            for (let j = 0; j < line.text.length; j++) {
              const ch   = line.text[j];
              const base = (i * cols + j) * 4;
              ctx.fillStyle = `rgb(${pixelData[base]},${pixelData[base+1]},${pixelData[base+2]})`;
              ctx.fillText(ch, charX, y);
              charX += widths.get(ch) ?? getCharWidth(font);
            }
            if (sizeVar > 0) ctx.setTransform(1, 0, 0, 1, 0, 0);
          }
        }
      }

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);

    // ════════════════════════════════════════════════════════════════════════
    //  CONTROLS — plain DOM wiring, no framework
    // ════════════════════════════════════════════════════════════════════════

    const colSlider  = document.getElementById('colSlider');
    const colVal     = document.getElementById('colVal');
    const sizeSelect = document.getElementById('sizeSelect');
    const rampSelect = document.getElementById('rampSelect');
    const colorBtn   = document.getElementById('colorBtn');
    const fileInput  = document.getElementById('fileInput');
    const fileLbl    = document.getElementById('fileLbl');
    const warnRow    = document.getElementById('warnRow');

    colSlider.addEventListener('input', () => {
      cols = parseInt(colSlider.value, 10);
      // colVal display is updated every frame in render() as "cols×rows"
    });

    sizeSelect.addEventListener('change', () => {
      fontSize = parseInt(sizeSelect.value, 10);
      widthCache.clear();      // font changed — invalidate char width cache
      monoWidthCache.clear();  // also invalidate single-char width cache
    });

    rampSelect.addEventListener('change', () => {
      rampKey = rampSelect.value;
    });

    colorBtn.addEventListener('click', () => {
      colorMode = colorMode === 'grey' ? 'rgb' : 'grey';
      colorBtn.textContent = colorMode;
      colorBtn.classList.toggle('on', colorMode === 'rgb');
      warnRow.style.display = colorMode === 'rgb' ? 'flex' : 'none';
    });

    const randSlider = document.getElementById('randSlider');
    const randVal    = document.getElementById('randVal');
    randSlider.addEventListener('input', () => {
      charRand = parseInt(randSlider.value, 10) / 100;
      randVal.textContent = `${randSlider.value}%`;
    });

    const varySlider = document.getElementById('varySlider');
    const varyVal    = document.getElementById('varyVal');
    varySlider.addEventListener('input', () => {
      sizeVar = parseInt(varySlider.value, 10) / 100;
      varyVal.textContent = `${varySlider.value}%`;
    });

    const bgColorInput = document.getElementById('bgColorInput');
    const bgOffBtn     = document.getElementById('bgOffBtn');
    bgColorInput.addEventListener('input', () => {
      bgColor = bgColorInput.value;
      bgOffBtn.style.color = '#eee';
    });
    bgOffBtn.addEventListener('click', () => {
      bgColor = null;
      bgOffBtn.style.color = '#555';
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files?.[0];
      if (!file) return;
      // Revoke any previous object URL to avoid memory leaks
      if (vid.src.startsWith('blob:')) URL.revokeObjectURL(vid.src);
      vid.src = URL.createObjectURL(file);
      vid.play().catch(() => {}); // browsers may require user gesture — usually fine here
      videoReady = true;
      exportBtn.disabled = false;
      // Truncate long filenames for display
      const name = file.name;
      fileLbl.textContent = name.length > 22 ? name.slice(0, 20) + '…' : name;
    });

    // ── Shape palette ──────────────────────────────────────────────────────
    document.querySelectorAll('.shape-add[data-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        const W = mainCanvas.width, H = mainCanvas.height;
        const type = btn.dataset.type;
        if (type === 'circle') {
          shapes.push({ id: nextShapeId++, type, x: W / 2, y: H / 2, r: Math.min(W, H) * 0.12 });
        } else {
          const w = W * 0.12, h = H * 0.22;
          shapes.push({ id: nextShapeId++, type, x: W/2 - w/2, y: H/2 - h/2, w, h });
        }
      });
    });

    document.getElementById('clearShapes').addEventListener('click', () => { shapes = []; });

    // ── Shape drag ────────────────────────────────────────────────────────
    mainCanvas.addEventListener('mousedown', e => {
      const s = shapeAtPoint(e.clientX, e.clientY);
      if (!s) return;
      dragShape = s; dragOx = e.clientX - s.x; dragOy = e.clientY - s.y;
    });

    window.addEventListener('mousemove', e => {
      if (!dragShape) {
        mainCanvas.style.cursor = shapeAtPoint(e.clientX, e.clientY) ? 'grab' : '';
        return;
      }
      mainCanvas.style.cursor = 'grabbing';
      dragShape.x = e.clientX - dragOx;
      dragShape.y = e.clientY - dragOy;
    });

    window.addEventListener('mouseup', () => {
      dragShape = null;
      mainCanvas.style.cursor = '';
    });

    // ════════════════════════════════════════════════════════════════════════
    //  EXPORT — VideoEncoder + webm-muxer offline pipeline
    //
    //  Instead of recording the live canvas in real-time (MediaRecorder),
    //  we seek through the source video frame-by-frame, render each frame to
    //  a dedicated output canvas at the video's native resolution, encode with
    //  VideoEncoder (VP9/VP8), mux with webm-muxer, then download the .webm.
    //
    //  This runs as fast as the CPU/GPU can encode — not limited to 1× playback.
    //  Output resolution matches the input video exactly.
    // ════════════════════════════════════════════════════════════════════════

    const exportBtn = document.getElementById('exportBtn');
    let exportCancelled = false;

    exportBtn.addEventListener('click', () => {
      if (exportBtn.classList.contains('recording')) {
        exportCancelled = true;   // signal the frame loop to stop
      } else {
        runExport();
      }
    });

    async function runExport() {
      const outW = vid.videoWidth;
      const outH = vid.videoHeight;

      // ── Export resolution + font size ──────────────────────────────────────
      // Upscale small sources so each column is at least 12px wide.
      // Never downscale: larger characters survive codec compression better.
      const minOutW        = cols * 12;
      const scale          = Math.max(1, minOutW / outW);
      const renderW        = Math.round(outW * scale);
      const renderH        = Math.round(outH * scale);

      const probeSize      = 40;
      const probeCtx       = document.createElement('canvas').getContext('2d');
      probeCtx.font        = `${probeSize}px ${RENDER_FONT_FAMILY}`;
      const probeCharW     = probeCtx.measureText('m').width;
      const exportFontSize = probeSize * (renderW / cols) / probeCharW;
      const exportLineH    = exportFontSize * 1.2;
      const exportRows     = Math.max(1, Math.floor(renderH / exportLineH));
      const exportFont     = `${exportFontSize}px ${RENDER_FONT_FAMILY}`;

      // Scale shape coords from live canvas → export canvas
      const liveW      = mainCanvas.width, liveH = mainCanvas.height;
      const shapeScaleX = renderW / liveW,  shapeScaleY = renderH / liveH;

      // ── Codec negotiation ──────────────────────────────────────────────────
      // Priority: AV1 → VP9 → VP8. Each probed with isConfigSupported at runtime.
      //
      // Quantizer q=30 is the research-backed sweet spot for ASCII text:
      //   • Preserves sharp glyph edges (DCT artifacts become visible above q=33)
      //   • ~4× smaller than q=0 lossless for frames with frequent character changes
      //   • AV1 at q=30 is ~30% smaller again than VP9 at q=30 (Chrome 90+)
      //
      // Keyframe every 2 s (instead of 1 s) saves another 30–40%.
      const exportFps     = 30;
      const frameDuration = Math.round(1_000_000 / exportFps);
      const QUANTIZER     = 20; // near-lossless — preserves sharp anti-aliased text edges

      const base = { width: renderW, height: renderH, framerate: exportFps, latencyMode: 'quality' };
      const candidates = [
        // AV1 — ~30% smaller than VP9 at same quality; Chrome 90+ software encoding
        { muxerCodec: 'V_AV1', codecType: 'av1', cfg: { ...base, codec: 'av01.0.04M.08', bitrateMode: 'quantizer' } },
        // VP9 — solid fallback, universal WebCodecs support
        { muxerCodec: 'V_VP9', codecType: 'vp9', cfg: { ...base, codec: 'vp09.00.41.08', bitrateMode: 'quantizer' } },
        { muxerCodec: 'V_VP9', codecType: 'vp9', cfg: { ...base, codec: 'vp09.00.31.08', bitrateMode: 'quantizer' } },
        // Fixed-bitrate fallbacks
        { muxerCodec: 'V_VP9', codecType: 'vp9', cfg: { ...base, codec: 'vp09.00.41.08', bitrate: 4_000_000 } },
        { muxerCodec: 'V_VP8', codecType: 'vp8', cfg: { ...base, codec: 'vp8', bitrate: 4_000_000 } },
      ];
      let chosen;
      for (const c of candidates) {
        const { supported } = await VideoEncoder.isConfigSupported(c.cfg);
        if (supported) { chosen = c; break; }
      }
      if (!chosen) { alert('VideoEncoder not supported in this browser.'); return; }

      const useQuantizer = chosen.cfg.bitrateMode === 'quantizer';

      // ── webm-muxer + VideoEncoder ──────────────────────────────────────────
      const target = new ArrayBufferTarget();
      const muxer  = new Muxer({
        target,
        video: { codec: chosen.muxerCodec, width: renderW, height: renderH, frameRate: exportFps },
        firstTimestampBehavior: 'offset', // rVFC mediaTime starts at the frame's PTS, not 0
      });
      let encodeError = false;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => {
          encodeError = true;
          console.error('VideoEncoder error:', e);
          exportBtn.textContent = `encode error — ${e.message ?? e}`;
        },
      });
      encoder.configure(chosen.cfg);
      console.log('Export codec:', chosen.cfg.codec, useQuantizer ? `(q=${QUANTIZER})` : `(${chosen.cfg.bitrate/1e6} Mbps)`);

      // ── Dedicated canvases ─────────────────────────────────────────────────
      const expSample  = document.createElement('canvas');
      expSample.width  = cols;  expSample.height = exportRows;
      const expSCtx    = expSample.getContext('2d', { willReadFrequently: true });

      const expRender  = document.createElement('canvas');
      expRender.width  = renderW;  expRender.height = renderH;
      const expRCtx    = expRender.getContext('2d', { alpha: false });

      expRCtx.font = exportFont;
      const expWidths = new Map();
      for (const ch of new Set(Object.values(RAMPS).join('')))
        expWidths.set(ch, expRCtx.measureText(ch).width);

      // ── State ──────────────────────────────────────────────────────────────
      const wasLoop   = vid.loop;
      let frameCount  = 0;
      let finalizing  = false;

      async function finalize() {
        if (finalizing) return;
        finalizing = true;
        await encoder.flush();
        if (encodeError) { restore(); return; }
        muxer.finalize();
        const { buffer } = target;
        if (buffer.byteLength < 100) {
          alert(`Export failed: muxer produced ${buffer.byteLength} bytes (encoder likely errored — check console).`);
          restore();
          return;
        }
        const blob = new Blob([buffer], { type: 'video/webm' });
        const a    = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(blob), download: 'ascii.webm',
        });
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 30_000);
        restore();
      }

      function restore() {
        isExporting           = false;
        vid.playbackRate      = 1;
        vid.loop              = wasLoop;
        vid.currentTime       = 0;
        vid.play().catch(() => {});
        exportBtn.textContent = 'export';
        exportBtn.classList.remove('recording');
      }

      // ── Rewind and start ───────────────────────────────────────────────────
      vid.loop         = false;
      exportCancelled  = false;
      isExporting      = true;
      vid.currentTime  = 0;
      await new Promise(res => vid.addEventListener('seeked', res, { once: true }));

      exportBtn.textContent = '0% — cancel';
      exportBtn.classList.add('recording');

      // Safety net: ended event in case rVFC misses the very last frame
      vid.addEventListener('ended', () => { if (!exportCancelled) finalize(); }, { once: true });

      vid.playbackRate = 2;     // 2× real-time, captures all frames at 60Hz display
      vid.play().catch(() => {});

      // ── requestVideoFrameCallback loop ─────────────────────────────────────
      // rVFC fires per decoded frame. We use metadata.mediaTime (not wall-clock)
      // as the VideoFrame timestamp → output video plays at the correct speed
      // regardless of playbackRate. This is the critical difference vs captureStream
      // + MediaRecorder which uses wall-clock time and would run at 2× speed.
      function onFrame(now, metadata) {
        if (exportCancelled) { encoder.close(); restore(); return; }
        if (finalizing) return; // rVFC callbacks already queued — drop them

        // Sample video at export grid resolution
        expSCtx.drawImage(vid, 0, 0, cols, exportRows);
        const px       = expSCtx.getImageData(0, 0, cols, exportRows).data;
        const charGrid = buildVideoGrid(px, exportRows);

        // Render ASCII to export canvas
        expRCtx.fillStyle    = '#000000';
        expRCtx.fillRect(0, 0, renderW, renderH);
        expRCtx.font         = exportFont;
        expRCtx.textBaseline = 'top';

        const expStartY = (renderH - exportRows * exportLineH) / 2;

        if (bgColor !== null) {
          const bgCw = expRCtx.measureText('m').width;
          expRCtx.fillStyle = bgColor;
          expRCtx.fillRect(Math.round((renderW - cols * bgCw) / 2), expStartY, cols * bgCw, exportRows * exportLineH);
        }
        const expPivX   = renderW / 2;

        if (shapes.length > 0) {
          // ── Reflow path ──────────────────────────────────────────────────
          const ecw = expRCtx.measureText('m').width;

          const egx0 = Math.round((renderW - cols * ecw) / 2);
          const egx1 = egx0 + cols * ecw;
          if (colorMode !== 'rgb') expRCtx.fillStyle = '#eee';
          for (let i = 0; i < exportRows; i++) {
            const y    = expStartY + i * exportLineH;
            const midY = y + exportLineH / 2;
            let eBlockW = 0;
            for (const s of shapes) {
              const b = shapeBlock(s, midY, shapeScaleX, shapeScaleY);
              if (!b) continue;
              const il = Math.max(egx0, b.l), ir = Math.min(egx1, b.r);
              if (ir > il) eBlockW += (ir - il);
            }
            const eSpanW = cols * ecw + eBlockW;
            const eX0    = Math.round((renderW - eSpanW) / 2);
            const segs = rowSegments(midY, eX0, eX0 + eSpanW, shapeScaleX, shapeScaleY);
            if (sizeVar > 0) {
              const s = 1 + (Math.random() * 2 - 1) * sizeVar;
              expRCtx.setTransform(s, 0, 0, s, expPivX*(1-s), (y+exportLineH/2)*(1-s));
            }
            let col = 0;
            for (const seg of segs) {
              let x = seg.l;
              while (col < cols && x + ecw <= seg.r + 0.5) {
                const ch = charGrid[i]?.[col] ?? ' ';
                if (colorMode === 'rgb') {
                  const b = (i * cols + col) * 4;
                  expRCtx.fillStyle = `rgb(${px[b]},${px[b+1]},${px[b+2]})`;
                }
                expRCtx.fillText(ch, x, y);
                x += ecw; col++;
              }
            }
            if (sizeVar > 0) expRCtx.setTransform(1, 0, 0, 1, 0, 0);
          }
          drawShapeOutlines(expRCtx, shapeScaleX, shapeScaleY);

        } else {
          // ── Normal pretext path ───────────────────────────────────────────
          const { lines } = layoutWithLines(
            prepareWithSegments(charGrid.join('\n'), exportFont, { whiteSpace: 'pre-wrap' }),
            renderW, exportLineH
          );
          const startY = (renderH - lines.length * exportLineH) / 2;

          if (colorMode === 'grey') {
            expRCtx.fillStyle = '#eee';
            for (let li = 0; li < lines.length; li++) {
              const ln = lines[li];
              const y  = startY + li * exportLineH;
              if (sizeVar > 0) {
                const s = 1 + (Math.random() * 2 - 1) * sizeVar;
                expRCtx.setTransform(s, 0, 0, s, expPivX * (1 - s), (y + exportLineH / 2) * (1 - s));
              }
              expRCtx.fillText(ln.text, (renderW - ln.width) / 2, y);
            }
            if (sizeVar > 0) expRCtx.setTransform(1, 0, 0, 1, 0, 0);
          } else {
            for (let li = 0; li < lines.length; li++) {
              const ln = lines[li];
              const y  = startY + li * exportLineH;
              if (sizeVar > 0) {
                const s = 1 + (Math.random() * 2 - 1) * sizeVar;
                expRCtx.setTransform(s, 0, 0, s, expPivX * (1 - s), (y + exportLineH / 2) * (1 - s));
              }
              let cx = (renderW - ln.width) / 2;
              for (let j = 0; j < ln.text.length; j++) {
                const ch = ln.text[j];
                const b  = (li * cols + j) * 4;
                expRCtx.fillStyle = `rgb(${px[b]},${px[b+1]},${px[b+2]})`;
                expRCtx.fillText(ch, cx, y);
                cx += expWidths.get(ch) ?? expRCtx.measureText(ch).width;
              }
              if (sizeVar > 0) expRCtx.setTransform(1, 0, 0, 1, 0, 0);
            }
          }
        }

        // Encode with media timestamp (not wall-clock) → correct playback speed.
        // duration is required: without it some decoders treat every frame as 0-length.
        const timestamp = Math.round(metadata.mediaTime * 1_000_000); // µs
        const isKey     = frameCount % exportFps === 0; // keyframe every 1s
        const vf        = new VideoFrame(expRender, { timestamp, duration: frameDuration });
        let encodeOpts;
        if (useQuantizer) {
          // AV1 and VP9 use different per-frame option keys for quantizer
          const qOpt = chosen.codecType === 'av1' ? { av1: { quantizer: QUANTIZER } } : { vp9: { quantizer: QUANTIZER } };
          encodeOpts = { keyFrame: isKey, ...qOpt };
        } else {
          encodeOpts = { keyFrame: isKey };
        }
        encoder.encode(vf, encodeOpts);
        vf.close();
        frameCount++;

        exportBtn.textContent = vid.duration > 0
          ? `${Math.round(metadata.mediaTime / vid.duration * 100)}% — cancel`
          : `${frameCount}fr — cancel`;

        if (!vid.ended && !exportCancelled) {
          vid.requestVideoFrameCallback(onFrame);
        } else {
          finalize();
        }
      }

      vid.requestVideoFrameCallback(onFrame);
    }

  </script>
</body>
</html>
